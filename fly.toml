# fly.toml — balance API (STAGE)
# This branch (main) deploys to the stage app. The prod branch carries its own
# fly.toml pointing at a separate app (e.g. balance-4pi-prod) with NODE_ENV=prod.
app = "balance-4pi"
primary_region = "iad"

[build]

# Non-sensitive config only. SECRETS LIVE IN FLY SECRETS, never here:
#   fly secrets set JWT_SECRET=<long-random> SEED_PASSWORD=<password> -a balance-4pi
# (fly.toml is committed plaintext — putting a secret here would leak it.)
# AUTH_BYPASS is unset -> false -> real auth (JWT_SECRET required). Set it to
# "true" here for frictionless stage dev with no token (user 1); never in prod.
[env]
  NODE_ENV = "stage"
  PORT = "3000"
  DB_PATH = "/data/balance.stage.db"
  CURRENCY = "MXN"
  JWT_EXPIRES_IN = "7d"

[http_service]
  internal_port = 3000
  force_https = true
  # Scale to zero when idle, wake on the next request — ~no cost while unused.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

# Persistent volume (Fly created it as "data") so the SQLite file survives
# restarts / redeploys / scale-to-zero.
[mounts]
  source = "data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
