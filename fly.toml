# fly.toml — balance API
app = "balance-4pi"
primary_region = "iad"

[build]

[env]
  NODE_ENV = "prod"
  PORT = "3000"
  DB_PATH = "/data/balance.prod.db"
  CURRENCY = "MXN"

[http_service]
  internal_port = 3000
  force_https = true
  # Scale to zero when idle, wake on the next request — ~no cost while unused.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

# Persistent volume (Fly created it as "data") so the SQLite file survives
# restarts / redeploys / scale-to-zero.
[mounts]
  source = "data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
