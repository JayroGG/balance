# fly.toml — balance API (STAGE)
# This branch (main) deploys to the stage app. The prod branch carries its own
# fly.toml pointing at a separate app (e.g. balance-4pi-prod) with NODE_ENV=prod.
app = "balance-4pi"
primary_region = "iad"

[build]

# Non-sensitive config only. SECRETS LIVE IN FLY SECRETS, never here:
#   JWT_SECRET and SEED_PASSWORD are set via Fly secrets (web UI or
#   `fly secrets set ... -a balance-4pi`) and injected at runtime.
# (fly.toml is committed plaintext — putting a secret here would leak it.)
# AUTH_BYPASS=false -> stage runs REAL auth (token required; JWT_SECRET needed).
[env]
  NODE_ENV = "stage"
  PORT = "3000"
  # Fresh file for the multi-tenant schema. The old /data/balance.stage.db
  # predates team_id; data is disposable, so we start clean rather than migrate.
  DB_PATH = "/data/balance.stage.v2.db"
  CURRENCY = "MXN"
  JWT_EXPIRES_IN = "7d"
  AUTH_BYPASS = "false"

[http_service]
  internal_port = 3000
  force_https = true
  # Scale to zero when idle, wake on the next request — ~no cost while unused.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

# Persistent volume (Fly created it as "data") so the SQLite file survives
# restarts / redeploys / scale-to-zero.
[mounts]
  source = "data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
